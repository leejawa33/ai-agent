[pytest]
asyncio_mode = auto
testpaths = tests
pythonpath = .
; eval은 실제 LLM 비용이 들므로 opt-in: pytest -m eval 로만 실행 (CLI -m이 아래를 덮어씀)
addopts = -m "not eval"
markers =
    real_llm: 실제 OpenAI 호출 또는 cassette 재생이 필요한 테스트
    vcr: pytest-recording cassette 사용
    eval: 골든셋 eval — 실제 LLM 호출 (opt-in, pytest -m eval)
