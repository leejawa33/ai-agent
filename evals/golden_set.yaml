# Phase 4 골든셋 — 질문 + 기대 도구 사용 패턴 + 채점 방법
#
# 스키마:
#   id: 고유 id (category-NNN)
#   category: calc | time | wiki | no_tool | multi_tool | robustness
#   question: 사용자 질문
#   expected_tools: 기대하는 도구 사용 집합 (순서 무관, final_answer 제외. []는 도구 없이 답해야 함)
#   grading:
#     method: contains — expected 문자열이 답변에 포함되면 정답 (결정론적 케이스)
#             judge    — LLM-as-judge가 criteria 기준으로 채점 (비결정론적 케이스)
#
# 주의: contains 케이스는 피연산자 숫자가 정답 문자열을 부분 포함하지 않도록 설계
#       (예: "144를 12로 나누면?" → 정답 12가 질문 에코에 섞여 오탐)

# --- calc: 계산기 도구 선택 + 정답 (결정론적 → contains) ---
- id: calc-001
  category: calc
  question: "12 곱하기 3 더하기 4는 얼마야?"
  expected_tools: [calculator]
  grading: {method: contains, expected: "40"}

- id: calc-002
  category: calc
  question: "(15+7)*4 계산해줘"
  expected_tools: [calculator]
  grading: {method: contains, expected: "88"}

- id: calc-003
  category: calc
  question: "100을 4로 나누면?"
  expected_tools: [calculator]
  grading: {method: contains, expected: "25"}

- id: calc-004
  category: calc
  question: "1024 나누기 8은 얼마야?"
  expected_tools: [calculator]
  grading: {method: contains, expected: "128"}

- id: calc-005
  category: calc
  question: "3.5 더하기 2.5는?"
  expected_tools: [calculator]
  grading: {method: contains, expected: "6"}

- id: calc-006
  category: calc
  question: "(100-25)*2를 계산해줘"
  expected_tools: [calculator]
  grading: {method: contains, expected: "150"}

- id: calc-007
  category: calc
  question: "7 곱하기 8에서 6을 빼면 얼마지?"
  expected_tools: [calculator]
  grading: {method: contains, expected: "50"}

- id: calc-008
  category: calc
  question: "45와 55를 더한 값은?"
  expected_tools: [calculator]
  grading: {method: contains, expected: "100"}

- id: calc-009
  category: calc
  question: "999 더하기 1은?"
  expected_tools: [calculator]
  grading: {method: contains, expected: "1000"}

- id: calc-010
  category: calc
  question: "91을 7로 나누면 얼마야?"
  expected_tools: [calculator]
  grading: {method: contains, expected: "13"}

# --- time: current_time 도구 선택 (값이 비결정론 → judge) ---
- id: time-001
  category: time
  question: "지금 몇 시야?"
  expected_tools: [current_time]
  grading: {method: judge, criteria: "답변에 구체적인 시각 정보(시/분)가 포함되어 있으면 정답"}

- id: time-002
  category: time
  question: "오늘 날짜 알려줘"
  expected_tools: [current_time]
  grading: {method: judge, criteria: "답변에 구체적인 날짜(연/월/일)가 포함되어 있으면 정답"}

- id: time-003
  category: time
  question: "현재 시간을 알려주고 간단히 인사도 해줘"
  expected_tools: [current_time]
  grading: {method: judge, criteria: "구체적인 시각 정보와 인사말이 모두 포함되어 있으면 정답"}

