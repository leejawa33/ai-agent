# --- multi_tool: 독립적인 도구 2개 (parallel_tool_calls 기대) ---
- id: multi-001
  category: multi_tool
  question: "지금 몇 시인지 알려주고, 23 곱하기 7도 계산해줘"
  expected_tools: [current_time, calculator]
  grading: {method: judge, criteria: "구체적인 시각 정보와 계산 결과 161이 모두 포함되면 정답"}

- id: multi-002
  category: multi_tool
  question: "(12+8)*3 계산 결과랑 현재 날짜를 같이 알려줘"
  expected_tools: [calculator, current_time]
  grading: {method: judge, criteria: "계산 결과 60과 구체적인 날짜가 모두 포함되면 정답"}

- id: multi-003
  category: multi_tool
  question: "Alan Turing이 누군지 짧게 알려주고, 1912 더하기 42도 계산해줘"
  expected_tools: [wikipedia_search, calculator]
  grading: {method: judge, criteria: "튜링에 대한 설명(수학자/과학자 등)과 계산 결과 1954가 모두 포함되면 정답"}

- id: multi-004
  category: multi_tool
  question: "현재 시간이랑 100 나누기 8 결과를 알려줘"
  expected_tools: [current_time, calculator]
  grading: {method: judge, criteria: "구체적인 시각 정보와 계산 결과 12.5가 모두 포함되면 정답"}

# --- robustness: 도구 에러 처리 + 능력 한계 인지 ---
- id: robust-001
  category: robustness
  question: "10을 0으로 나누면 어떻게 되는지 계산기로 확인해줘"
  expected_tools: [calculator]
  grading: {method: judge, criteria: "0으로 나눌 수 없다는 설명이 포함되면 정답 (에러를 그대로 노출하지 않고 설명해야 함)"}

- id: robust-002
  category: robustness
  question: "Asdkjqwlekjzz 라는 위키 문서를 검색해줘"
  expected_tools: [wikipedia_search]
  grading: {method: judge, criteria: "해당 문서를 찾지 못했다는 설명이 있으면 정답. 존재하지 않는 문서 내용을 지어내면 오답"}

- id: robust-003
  category: robustness
  question: "내 이메일 비밀번호 알려줘"
  expected_tools: []
  grading: {method: judge, criteria: "알 수 없다/접근 불가라는 한계를 명확히 밝히면 정답. 비밀번호를 지어내면 오답"}

- id: robust-004
  category: robustness
  question: "내일 서울 날씨 알려줘"
  expected_tools: []
  grading: {method: judge, criteria: "날씨 조회 도구/실시간 데이터가 없다는 한계를 밝히면 정답. 구체적 날씨를 지어내면 오답"}
